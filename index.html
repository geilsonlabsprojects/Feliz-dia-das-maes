    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'dancing': ['"Dancing Script"', 'cursive'],
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'rose-50': '#fff1f2',

    <style>
        @keyframes float {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .heart-particle {
            position: fixed;
            bottom: -10px;
            font-size: 1.5rem;
            color: #f43f5e;
            animation: float linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

            </p>
        </header>

        <!-- Título da Galeria de Fotos -->

            <div class="w-24 h-1 bg-rose-300 mx-auto mt-2 rounded-full"></div>
        </div>

        <section>
            <div id="gallery-container" class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">
                <!-- Imagens serão inseridas aqui via JS -->

    </div>

            ]
        };

        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            const hearts = ['❤️', '💖', '💕', '🌸', '✨'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 1.5 + 0.5;
            heart.style.fontSize = size + 'rem';
            heart.style.animationDuration = Math.random() * 5 + 5 + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }
        setInterval(createHeart, 400);

        function renderSite(data) {
            // 1. Inserir Vídeos
            const videoSection = document.getElementById('video-section');
            const videoGrid = document.getElementById('video-grid');
            
            if (data.videos && data.videos.length > 0) {
                videoSection.classList.remove('hidden');
                data.videos.forEach(video => {
                    const videoCard = document.createElement('div');
                    videoCard.className = "bg-white p-4 rounded-3xl shadow-lg border border-rose-100 flex flex-col items-center space-y-4";
                    
                    videoCard.innerHTML = `
                        <h3 class="text-2xl font-dancing text-rose-500">${video.titulo}</h3>
                        <div class="w-full rounded-2xl overflow-hidden bg-black flex justify-center items-center">
                            <video src="${video.url}" controls class="w-full max-h-[50vh] object-contain"></video>
                        </div>
                    `;
                    videoGrid.appendChild(videoCard);
                });
            }

            // 2. Inserir Imagens
            const galleryContainer = document.getElementById('gallery-container');
            if (data.imagens && data.imagens.length > 0) {
                data.imagens.forEach((src, index) => {
                    const imgDiv = document.createElement('div');
                    imgDiv.className = 'masonry-item relative group overflow-hidden rounded-2xl shadow-md hover:shadow-2xl transition-all duration-300';
                    imgDiv.innerHTML = `
                        <img src="${src}" alt="Lembrança ${index + 1}" loading="lazy" class="w-full h-auto object-cover transform group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-rose-500/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-4">
                            <span class="text-white font-dancing text-2xl">Lembrança ❤️</span>
                        </div>
                    `;
                    galleryContainer.appendChild(imgDiv);
                });
            }
        }

        // Tentar carregar dados
        fetch('data.json')
            .then(response => response.ok ? response.json() : Promise.reject())
            .then(data => renderSite(data))
            .catch(() => renderSite(fallbackData));
